<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Landing -->
  <div class="landing" id="landing">
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>
    <div class="shape s4"></div>
    <div class="shape s5"></div>
    <span class="note n1">&#9835;</span>
    <span class="note n2">&#9834;</span>
    <span class="note n3">&#9833;</span>
    <span class="note n4">&#9839;</span>
    <div class="landing-content">
      <div class="badge">&#9835; Music Player</div>
      <h1 class="hero">
        <span class="hline h1">Start</span>
        <span class="hline h2 pop">Your</span>
        <span class="hline h3">Listening</span>
        <span class="hline h4 pop2">Journey</span>
      </h1>
      <p class="hero-sub">Discover, play, and vibe with your favorite tracks</p>
      <button class="start-btn" id="start-btn">
        Start Listening
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>

  <!-- App -->
  <div class="app hidden" id="app">
    <header class="header">
      <div class="logo">melo</div>
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search" placeholder="Search songs, artists...">
      </div>
    </header>

    <main class="content" id="content">
      <section class="greet-section">
        <h1 class="greeting" id="greeting">Good evening</h1>
        <p class="greeting-sub">What do you want to listen to?</p>
      </section>

      <section>
        <h2 class="sec-title">Browse Genres</h2>
        <div class="genre-scroll" id="genre-scroll"></div>
      </section>

      <section>
        <div class="sec-header">
          <h2 class="sec-title" id="sec-title">All Songs</h2>
          <span class="song-count" id="song-count"></span>
        </div>
        <div id="song-list"></div>
      </section>
    </main>

    <!-- Player Bar -->
    <div class="bar" id="bar">
      <div class="bar-progress" id="bar-progress"></div>
      <div class="bar-left" id="bar-left">
        <img class="bar-art" id="bar-art" src="https://picsum.photos/seed/default/300/300">
        <div>
          <div class="bar-title" id="bar-title">Not playing</div>
          <div class="bar-artist" id="bar-artist">&mdash;</div>
        </div>
      </div>
      <div class="bar-controls">
        <button class="bbtn" id="prev-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="bbtn play-btn" id="play-btn">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        </button>
        <button class="bbtn" id="next-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
      <div class="bar-right">
        <button class="bbtn sm" id="shuffle-btn" title="Shuffle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="bbtn sm" id="repeat-btn" title="Repeat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <button class="bbtn sm" id="heart-btn" title="Like">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <input type="range" class="vol" id="volume" min="0" max="100" value="70">
      </div>
    </div>

    <!-- Full Player -->
    <div class="full hidden" id="full">
      <button class="full-close" id="full-close">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <img class="full-art" id="full-art" src="https://picsum.photos/seed/default/300/300">
      <h2 class="full-title" id="full-title">Not playing</h2>
      <p class="full-artist" id="full-artist">&mdash;</p>
      <div class="waveform" id="waveform"></div>
      <div class="full-progress">
        <div class="full-bar" id="full-bar">
          <div class="full-fill" id="full-fill"></div>
        </div>
        <div class="full-times">
          <span id="f-cur">0:00</span>
          <span id="f-tot">0:00</span>
        </div>
      </div>
      <div class="full-ctrls">
        <button class="fbtn" id="f-shuffle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="fbtn" id="f-prev">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="fbtn f-play" id="f-play">
          <svg id="f-play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        </button>
        <button class="fbtn" id="f-next">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="fbtn" id="f-repeat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>
  <script src="data/songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
