<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">melo</div>
      <nav class="nav">
        <button class="nav-btn active" data-view="home">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Home
        </button>
        <button class="nav-btn" data-view="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </button>
        <button class="nav-btn" data-view="favorites">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Favorites
        </button>
      </nav>
      <div class="genre-header">Genres</div>
      <div id="genre-list"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <h1 class="view-title" id="view-title">Good evening</h1>
        <input type="search" class="search-input" id="search" placeholder="Search songs, artists...">
      </div>

      <div class="np-card">
        <div class="np-bg" id="np-bg"></div>
        <img class="np-art" id="np-art" src="https://picsum.photos/seed/default/300/300" alt="">
        <div class="np-body">
          <div class="np-title" id="np-title">Select a song</div>
          <div class="np-artist" id="np-artist">—</div>
          <div class="np-progress">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-times">
              <span id="current-time">0:00</span>
              <span id="total-time">0:00</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section-label" id="section-label">All Songs</div>
      <div id="song-list"></div>
    </main>

    <!-- Right Panel -->
    <aside class="panel">
      <div class="panel-card">
        <div class="card-label">Volume</div>
        <div class="vol-num" id="vol-display">70%</div>
        <input type="range" class="vol-slider" id="volume" min="0" max="100" value="70">
      </div>
      <div class="panel-card">
        <div class="card-label">Library</div>
        <div id="genre-bars"></div>
      </div>
      <div class="panel-card">
        <div class="card-label">Favorites</div>
        <div id="fav-list"></div>
      </div>
    </aside>

  </div>

  <!-- Player Bar -->
  <footer class="player">
    <div class="player-info">
      <img class="player-art" id="player-art" src="https://picsum.photos/seed/default/300/300" alt="">
      <div>
        <div class="player-title" id="player-title">Not playing</div>
        <div class="player-artist" id="player-artist">—</div>
      </div>
      <button class="heart-btn" id="heart-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="shuffle-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      </button>
      <button class="ctrl-btn" id="prev-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="ctrl-btn play-btn" id="play-btn">
        <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" id="next-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button class="ctrl-btn" id="repeat-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
    <div class="player-right">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#666;flex-shrink:0"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <input type="range" class="mini-vol" id="mini-vol" min="0" max="100" value="70">
    </div>
  </footer>

  <audio id="audio"></audio>
  <script src="data/songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
